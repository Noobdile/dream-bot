name: Dream Bot - Les compagnons du jour

on:
  workflow_dispatch:
  schedule:
    - cron: "1 22 * * *"
    - cron: "1 23 * * *"

jobs:
  post-discord:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Construire le message
        run: |
          python3 << 'PY'
          import json
          from datetime import datetime
          from zoneinfo import ZoneInfo

          jours = {
              "Monday": "lundi",
              "Tuesday": "mardi",
              "Wednesday": "mercredi",
              "Thursday": "jeudi",
              "Friday": "vendredi",
              "Saturday": "samedi",
              "Sunday": "dimanche"
          }

          now = datetime.now(ZoneInfo("Europe/Paris"))
          jour = jours[now.strftime("%A")]

          with open("data.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          lignes = data.get(jour, [])

          rares = []

          message = f"🌙 **LES COMPAGNONS DU JOUR — {jour.upper()}**\n\n"

          for ligne in lignes:
              message += ligne + "\n"

              if "Toute la journée" not in ligne:
                  rares.append(ligne)

          if rares:
              message += "\n⭐ **COMPAGNONS RARES DU JOUR** ⭐\n\n"

              for rare in rares:
                  message += f"**{rare}**\n"

          with open("message.txt", "w", encoding="utf-8") as f:
              f.write(message)
          PY

      - name: Poster sur Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 << 'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ["DISCORD_WEBHOOK"]

          with open("message.txt", "r", encoding="utf-8") as f:
              contenu = f.read()

          blocs = []

          while len(contenu) > 1900:
              coupe = contenu.rfind("\n", 0, 1900)

              if coupe == -1:
                  coupe = 1900

              blocs.append(contenu[:coupe])
              contenu = contenu[coupe:]

          blocs.append(contenu)

          for bloc in blocs:
              data = json.dumps({"content": bloc}).encode("utf-8")

              req = urllib.request.Request(
                  webhook,
                  data=data,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )

              urllib.request.urlopen(req)
          PY
