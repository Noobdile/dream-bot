name: Dream Bot - Les compagnons du jour

on:
  workflow_dispatch:
  schedule:
    - cron: "1 23 * * *"

jobs:
  post-discord:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Construire le message
        run: |
          python3 << 'PY'
          import json
          from datetime import datetime
          from zoneinfo import ZoneInfo

          jours = {
              "Monday": "lundi",
              "Tuesday": "mardi",
              "Wednesday": "mercredi",
              "Thursday": "jeudi",
              "Friday": "vendredi",
              "Saturday": "samedi",
              "Sunday": "dimanche"
          }

          now = datetime.now(ZoneInfo("Europe/Paris"))
          jour = jours[now.strftime("%A")]

          with open("data.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          lignes = data.get(jour, [])

          normales = [ligne for ligne in lignes if "Toute la journée" in ligne]
          rares = [ligne for ligne in lignes if "Toute la journée" not in ligne]

          contenu = f"🌙 **LES COMPAGNONS DU JOUR — {jour.upper()}**\n\n"
          contenu += "\n".join(normales)

          if rares:
              contenu += "\n\n⭐ **COMPAGNONS RARES DU JOUR** ⭐\n"
              contenu += "\n".join([f"**{rare}**" for rare in rares])

          if len(contenu) > 2000:
              raise SystemExit(f"Message trop long : {len(contenu)} caractères")

          with open("payload.json", "w", encoding="utf-8") as f:
              json.dump({"content": contenu}, f, ensure_ascii=False)
          PY

      - name: Poster sur Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          curl -i -X POST \
            -H "Content-Type: application/json" \
            --data @payload.json \
            "$DISCORD_WEBHOOK"
