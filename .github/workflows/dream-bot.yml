name: Dream Bot - Les compagnons du jour

on:
  workflow_dispatch:
  schedule:
    - cron: "1 22 * * *"

jobs:
  post-discord:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Construire le message
        run: |
          python3 << 'PY'
          import json
          from datetime import datetime
          from zoneinfo import ZoneInfo

          jours = {
              "Monday": "lundi",
              "Tuesday": "mardi",
              "Wednesday": "mercredi",
              "Thursday": "jeudi",
              "Friday": "vendredi",
              "Saturday": "samedi",
              "Sunday": "dimanche"
          }

          now = datetime.now(ZoneInfo("Europe/Paris"))
          jour = jours[now.strftime("%A")]

          with open("data.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          lignes = data.get(jour, [])
          rares = [ligne for ligne in lignes if "Toute la journée" not in ligne]

          contenu = f"🌙 **LES COMPAGNONS DU JOUR — {jour.upper()}**\n\n"
          contenu += "\n".join(lignes)

          if rares:
              contenu += "\n\n⭐ **COMPAGNONS RARES DU JOUR** ⭐\n\n"
              contenu += "\n".join([f"**{rare}**" for rare in rares])

          blocs = []

          while len(contenu) > 1800:
              coupe = contenu.rfind("\n", 0, 1800)
              if coupe == -1:
                  coupe = 1800
              blocs.append(contenu[:coupe])
              contenu = contenu[coupe:].lstrip()

          if contenu.strip():
              blocs.append(contenu)

          with open("messages.json", "w", encoding="utf-8") as f:
              json.dump(blocs, f, ensure_ascii=False)
          PY

      - name: Poster sur Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 << 'PY'
          import json

          with open("messages.json", "r", encoding="utf-8") as f:
              messages = json.load(f)

          for i, message in enumerate(messages, start=1):
              with open(f"payload-{i}.json", "w", encoding="utf-8") as f:
                  json.dump({"content": message}, f, ensure_ascii=False)
          PY

          for file in payload-*.json; do
            curl -i -X POST \
              -H "Content-Type: application/json" \
              --data @"$file" \
              "$DISCORD_WEBHOOK"
            echo ""
            sleep 1
          done
