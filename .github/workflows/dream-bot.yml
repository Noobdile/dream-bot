name: Dream Bot - Les compagnons du jour

on:
  workflow_dispatch:
  schedule:
    - cron: "1 22 * * *"
    - cron: "1 23 * * *"

jobs:
  post-discord:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Construire les messages
        run: |
          python3 << 'PY'
          import json
          from datetime import datetime
          from zoneinfo import ZoneInfo

          jours = {
              "Monday": "lundi",
              "Tuesday": "mardi",
              "Wednesday": "mercredi",
              "Thursday": "jeudi",
              "Friday": "vendredi",
              "Saturday": "samedi",
              "Sunday": "dimanche"
          }

          now = datetime.now(ZoneInfo("Europe/Paris"))
          jour = jours[now.strftime("%A")]

          with open("data.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          lignes = data.get(jour, ["Aucune information."])

          titre = f"🌙 **Les compagnons du jour — {jour.upper()}**\n\n"

          messages = []
          courant = titre

          for ligne in lignes:
              ajout = str(ligne) + "\n"

              if len(courant) + len(ajout) > 1800:
                  messages.append(courant)
                  courant = ajout
              else:
                  courant += ajout

          if courant.strip():
              messages.append(courant)

          with open("messages.json", "w", encoding="utf-8") as f:
              json.dump(messages, f, ensure_ascii=False)
          PY

      - name: Poster sur Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 << 'PY'
          import json
          import os
          import subprocess
          import time

          webhook = os.environ["DISCORD_WEBHOOK"]

          with open("messages.json", "r", encoding="utf-8") as f:
              messages = json.load(f)

          for i, message in enumerate(messages, start=1):
              with open("payload.json", "w", encoding="utf-8") as f:
                  json.dump({"content": message}, f, ensure_ascii=False)

              result = subprocess.run(
                  [
                      "curl",
                      "-sS",
                      "-i",
                      "-X", "POST",
                      "-H", "Content-Type: application/json",
                      "--data", "@payload.json",
                      webhook
                  ],
                  capture_output=True,
                  text=True
              )

              print(result.stdout)
              print(result.stderr)

              if result.returncode != 0 or "HTTP/2 204" not in result.stdout:
                  raise SystemExit(1)

              time.sleep(1)
          PY
