name: Dream Bot - Les compagnons du jour

on:
  workflow_dispatch:
  schedule:
    - cron: "1 22 * * *"
    - cron: "1 23 * * *"

jobs:
  post-discord:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Construire les messages
        run: |
          python3 << 'PY'
          import json
          from datetime import datetime
          from zoneinfo import ZoneInfo

          jours = {
              "Monday": "lundi",
              "Tuesday": "mardi",
              "Wednesday": "mercredi",
              "Thursday": "jeudi",
              "Friday": "vendredi",
              "Saturday": "samedi",
              "Sunday": "dimanche"
          }

          now = datetime.now(ZoneInfo("Europe/Paris"))
          jour = jours[now.strftime("%A")]

          with open("data.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          lignes = data.get(jour, ["Aucune information."])

          titre = f"🌙 LES COMPAGNONS DU JOUR — {jour.upper()}\n\n"

          blocs = []
          courant = titre

          for ligne in lignes:
              ajout = ligne + "\n"

              if len(courant) + len(ajout) > 1900:
                  blocs.append(courant)
                  courant = ajout
              else:
                  courant += ajout

          blocs.append(courant)

          with open("messages.json", "w", encoding="utf-8") as f:
              json.dump(blocs, f, ensure_ascii=False)
          PY

      - name: Poster sur Discord
        run: |
          python3 << 'PY'
          import json
          import os
          import urllib.request

          webhook = os.environ["DISCORD_WEBHOOK"]

          with open("messages.json", "r", encoding="utf-8") as f:
              messages = json.load(f)

          for message in messages:
              data = json.dumps({"content": message}).encode("utf-8")

              req = urllib.request.Request(
                  webhook,
                  data=data,
                  headers={"Content-Type": "application/json"},
                  method="POST"
              )

              urllib.request.urlopen(req)
          PY
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
