name: Dream Bot - Les compagnons du jour

on:
  workflow_dispatch:
  schedule:
    - cron: "1 22 * * *"
    - cron: "1 23 * * *"

jobs:
  post-discord:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Construire le message
        run: |
          python3 << 'PY'
          import json
          from datetime import datetime
          from zoneinfo import ZoneInfo

          jours = {
              "Monday": "lundi",
              "Tuesday": "mardi",
              "Wednesday": "mercredi",
              "Thursday": "jeudi",
              "Friday": "vendredi",
              "Saturday": "samedi",
              "Sunday": "dimanche"
          }

          now = datetime.now(ZoneInfo("Europe/Paris"))
          jour = jours[now.strftime("%A")]

          with open("data.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          lignes = data.get(jour, ["Aucune information."])

          message = "🌙 **Les compagnons du jour — " + jour.upper() + "**\n\n"
          message += "\n".join(lignes)

          with open("payload.json", "w", encoding="utf-8") as f:
              json.dump({"content": message}, f, ensure_ascii=False)
          PY

      - name: Poster sur Discord
        run: |
          curl -i -X POST \
            -H "Content-Type: application/json" \
            --data @payload.json \
            "${{ secrets.DISCORD_WEBHOOK }}"
